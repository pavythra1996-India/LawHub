<!DOCTYPE html>
<html>
<head>
    <title>Document Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        form { margin-bottom: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; }
    </style>
</head>
<body>
    <h1>Legal Document Generator</h1>
    <form id="document-form">
        <div class="form-group">
            <label for="docType">Select Document Type:</label>
            <select id="docType" name="docType">
                <option value="legalNotice">Legal Notice</option>
                <option value="consumerComplaint">Consumer Complaint</option>
                <option value="rentalAgreement">Rental Agreement</option>
                <option value="affidavit">Affidavit</option>
            </select>
        </div>
        <div class="form-group">
            <label for="userName">Your Name:</label>
            <input type="text" id="userName" name="userName" required />
        </div>
        <div class="form-group">
            <label for="userAddress">Your Address:</label>
            <input type="text" id="userAddress" name="userAddress" required />
        </div>
        <div class="form-group">
            <label for="documentDetails">Details:</label>
            <textarea id="documentDetails" name="documentDetails" rows="5" required></textarea>
        </div>
        <button type="submit">Generate Document</button>
    </form>
    <script>
        document.getElementById('document-form').onsubmit = function(event) {
            event.preventDefault();
            const docType = document.getElementById('docType').value;
            const userName = document.getElementById('userName').value;
            const userAddress = document.getElementById('userAddress').value;
            const documentDetails = document.getElementById('documentDetails').value;
            alert(`Generating ${docType} for ${userName} at ${userAddress}.\nDetails: ${documentDetails}`);
            // Here you can add the logic to generate the document based on the selected type and user input.
        };
    </script>
</body>
</html>
